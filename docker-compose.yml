services:
  api:
    build: .
    ports:
      - "8080:8080"
      - "8081:443"
    environment:
      DOTNET_ENVIRONMENT: docker
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=urlshortener;Username=postgres;Password=postgres
      ConnectionStrings__Redis: redis:6379
      Seq__ServerUrl: http://seq:80
    depends_on:
      - postgres
      - redis
      - seq

  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:8
    ports:
      - "6379:6379"

  seq:
    image: datalust/seq
    environment:
      ACCEPT_EULA: Y
      SEQ_FIRSTRUN_ADMINPASSWORD: "seqadmin"
    ports:
      - "5341:80"
